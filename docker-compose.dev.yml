# ERP Frappe - Development Environment with Docker
# Basado en: https://github.com/frappe/frappe_docker/blob/main/devcontainer-example/docker-compose.yml
#
# Uso:
#   docker compose -f docker-compose.dev.yml --env-file .env.dev up -d
#   docker compose -f docker-compose.dev.yml --env-file .env.dev exec backend bash
#
#   # Dentro del contenedor (como usuario frappe):
#   cd /workspace/development
#   bench init --skip-redis-config-generation --frappe-branch version-16 frappe-bench
#   cd frappe-bench
#   bench start

services:
  mariadb:
    image: docker.io/mariadb:11.8
    container_name: erp-mariadb
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
      # Binlogs para Point-in-Time Recovery (PITR)
      - --log-bin=/var/lib/mysql/binlog
      - --binlog-format=ROW
      - --expire-logs-days=7
      - --max-binlog-size=100M
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-123}
      MARIADB_AUTO_UPGRADE: 1
    volumes:
      - mariadb-data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - erp-network

  redis-cache:
    image: docker.io/redis:alpine
    container_name: erp-redis-cache
    networks:
      - erp-network

  redis-queue:
    image: docker.io/redis:alpine
    container_name: erp-redis-queue
    networks:
      - erp-network

  backend:
    image: docker.io/frappe/bench:latest
    container_name: erp-backend
    user: frappe
    command: sleep infinity
    environment:
      - SHELL=/bin/bash
    volumes:
      # Montar todo el proyecto para edición en host
      - .:/workspace:cached
      # SSH para git cloning
      - ${HOME}/.ssh:/home/frappe/.ssh:cached
    working_dir: /workspace
    ports:
      - "8000-8005:8000-8005"
      - "9000-9005:9000-9005"
    depends_on:
      mariadb:
        condition: service_healthy
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started
    networks:
      - erp-network
    stdin_open: true
    tty: true

  # Nginx frontend para servir la app en producción-like mode
  # Descomentar si se necesita proxy inverso local
  # frontend:
  #   image: docker.io/nginx:alpine
  #   container_name: erp-frontend
  #   volumes:
  #     - ./nginx-dev.conf:/etc/nginx/nginx.conf:ro
  #   ports:
  #     - "8080:8080"
  #   depends_on:
  #     - backend
  #   networks:
  #     - erp-network

volumes:
  mariadb-data:

networks:
  erp-network:
    driver: bridge
