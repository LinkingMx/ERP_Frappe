# ERP Frappe - Development Environment with Docker
# Bind mounts para desarrollo: código editable en host, reflejado en contenedores
#
# Uso:
#   docker compose -f docker-compose.dev.yml --env-file .env.dev up -d
#   docker compose -f docker-compose.dev.yml --env-file .env.dev exec backend bash
#
#   # Dentro del contenedor:
#   cd /home/frappe/frappe-bench
#   bench start

services:
  # Base de datos
  mariadb:
    image: docker.io/mariadb:11.8
    container_name: erp-mariadb
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-123}
      MARIADB_AUTO_UPGRADE: 1
    volumes:
      - mariadb-data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - erp-network

  # Redis Cache
  redis-cache:
    image: docker.io/redis:alpine
    container_name: erp-redis-cache
    networks:
      - erp-network

  # Redis Queue
  redis-queue:
    image: docker.io/redis:alpine
    container_name: erp-redis-queue
    networks:
      - erp-network

  # Backend - Bench con bind mounts para desarrollo
  backend:
    image: docker.io/frappe/bench:latest
    container_name: erp-backend
    command: sleep infinity
    environment:
      - SHELL=/bin/bash
      - DB_HOST=mariadb
      - DB_PORT=3306
      - REDIS_CACHE=redis-cache:6379
      - REDIS_QUEUE=redis-queue:6379
      - DEVELOPER_MODE=1
    volumes:
      # Código fuente editable desde host
      - ./apps:/home/frappe/frappe-bench/apps:cached
      # Sitios y configuración
      - ./sites:/home/frappe/frappe-bench/sites:cached
      # Logs accesibles desde host
      - ./logs:/home/frappe/frappe-bench/logs:cached
      # Entorno virtual persistente
      - env-data:/home/frappe/frappe-bench/env
      # Config de bench
      - ./config:/home/frappe/frappe-bench/config:cached
    working_dir: /home/frappe/frappe-bench
    ports:
      - "8000:8000"
      - "9000:9000"
    depends_on:
      mariadb:
        condition: service_healthy
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started
    networks:
      - erp-network
    stdin_open: true
    tty: true

  # Frontend - Nginx para servir assets estáticos
  frontend:
    image: docker.io/frappe/erpnext:${ERPNEXT_VERSION:-v16.15.1}
    container_name: erp-frontend
    command:
      - nginx-entrypoint
    environment:
      BACKEND: backend:8000
      SOCKETIO: websocket:9000
      FRAPPE_SITE_NAME_HEADER: ${FRAPPE_SITE_NAME_HEADER:-development.localhost}
      UPSTREAM_REAL_IP_ADDRESS: 127.0.0.1
      UPSTREAM_REAL_IP_HEADER: X-Forwarded-For
      UPSTREAM_REAL_IP_RECURSIVE: "off"
      PROXY_READ_TIMEOUT: 120
      CLIENT_MAX_BODY_SIZE: 50m
    volumes:
      - ./sites:/home/frappe/frappe-bench/sites:ro
    ports:
      - "8080:8080"
    depends_on:
      - backend
      - websocket
    networks:
      - erp-network

  # WebSocket para Socket.IO
  websocket:
    image: docker.io/frappe/erpnext:${ERPNEXT_VERSION:-v16.15.1}
    container_name: erp-websocket
    command:
      - node
      - /home/frappe/frappe-bench/apps/frappe/socketio.js
    volumes:
      - ./sites:/home/frappe/frappe-bench/sites
    networks:
      - erp-network

  # Queue Workers
  queue-short:
    image: docker.io/frappe/erpnext:${ERPNEXT_VERSION:-v16.15.1}
    container_name: erp-queue-short
    command: bench worker --queue short,default
    volumes:
      - ./sites:/home/frappe/frappe-bench/sites
      - env-data:/home/frappe/frappe-bench/env
    depends_on:
      - backend
    networks:
      - erp-network

  queue-long:
    image: docker.io/frappe/erpnext:${ERPNEXT_VERSION:-v16.15.1}
    container_name: erp-queue-long
    command: bench worker --queue long,default,short
    volumes:
      - ./sites:/home/frappe/frappe-bench/sites
      - env-data:/home/frappe/frappe-bench/env
    depends_on:
      - backend
    networks:
      - erp-network

  # Scheduler
  scheduler:
    image: docker.io/frappe/erpnext:${ERPNEXT_VERSION:-v16.15.1}
    container_name: erp-scheduler
    command: bench schedule
    volumes:
      - ./sites:/home/frappe/frappe-bench/sites
      - env-data:/home/frappe/frappe-bench/env
    depends_on:
      - backend
    networks:
      - erp-network

volumes:
  mariadb-data:
  env-data:

networks:
  erp-network:
    driver: bridge
