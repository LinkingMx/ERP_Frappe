# ERP Frappe - Backup Infrastructure
# Estrategia híbrida: MariaDB Backup incremental + Restic (deduplicación)
#
# Uso:
#   # Backup FULL (domingos)
#   docker compose -f docker-compose.backup.yml run --rm mariadb-backup-full
#
#   # Backup INCREMENTAL (lun-sáb)
#   docker compose -f docker-compose.backup.yml run --rm mariadb-backup-inc
#
#   # Backup de sites/archivos con Restic
#   docker compose -f docker-compose.backup.yml run --rm restic-backup
#
#   # Listar snapshots Restic
#   docker compose -f docker-compose.backup.yml run --rm restic-snapshots
#
#   # Restaurar MariaDB
#   docker compose -f docker-compose.backup.yml run --rm mariadb-restore

services:
  # ============================================================
  # MARIADB BACKUP - Backups a nivel de bloques (físicos)
  # ============================================================

  mariadb-backup-full:
    image: docker.io/mariadb:11.8
    container_name: erp-mariadb-backup-full
    command:
      - bash
      - -c
      - |
        set -e
        echo "🗄️  MariaDB Backup FULL - $$(date)"
        echo "================================================"
        
        BACKUP_DIR="/backup/full/$$(date +%Y%m%d_%H%M%S)"
        mkdir -p $$BACKUP_DIR
        
        # Ejecutar backup físico completo
        mariadb-backup --backup \
          --host=mariadb \
          --user=root \
          --password=$${DB_PASSWORD} \
          --target-dir=$$BACKUP_DIR \
          --parallel=4 \
          2>&1
        
        # Guardar metadata del backup
        echo "$$(date -Iseconds) | FULL | $$BACKUP_DIR" >> /backup/backup.log
        
        # Limpiar backups FULL viejos (mantener últimos 4)
        ls -1td /backup/full/* 2>/dev/null | tail -n +5 | xargs -r rm -rf
        
        echo "✅ Backup FULL completado: $$BACKUP_DIR"
        echo "📊 Tamaño: $$(du -sh $$BACKUP_DIR | cut -f1)"
    environment:
      DB_PASSWORD: ${DB_PASSWORD:-123}
    volumes:
      - mariadb-data:/var/lib/mysql:ro
      - ./backups/mariadb-full:/backup/full
      - ./backups/mariadb-inc:/backup/inc
      - ./backups/backup.log:/backup/backup.log
    networks:
      - erp-network
    depends_on:
      - mariadb

  mariadb-backup-inc:
    image: docker.io/mariadb:11.8
    container_name: erp-mariadb-backup-inc
    command:
      - bash
      - -c
      - |
        set -e
        echo "🗄️  MariaDB Backup INCREMENTAL - $$(date)"
        echo "================================================"
        
        # Buscar el backup base más reciente (full o incremental)
        FULL_DIR=$$(ls -1td /backup/full/* 2>/dev/null | head -1)
        INC_DIRS=$$(ls -1td /backup/inc/* 2>/dev/null | head -1)
        
        if [ -n "$${INC_DIRS}" ]; then
          BASE_DIR=$$INC_DIRS
          echo "📂 Base: incremental anterior ($$BASE_DIR)"
        elif [ -n "$${FULL_DIR}" ]; then
          BASE_DIR=$$FULL_DIR
          echo "📂 Base: full ($$BASE_DIR)"
        else
          echo "❌ No hay backup FULL previo. Ejecuta mariadb-backup-full primero."
          exit 1
        fi
        
        BACKUP_DIR="/backup/inc/$$(date +%Y%m%d_%H%M%S)"
        mkdir -p $$BACKUP_DIR
        
        # Backup incremental basado en el anterior
        mariadb-backup --backup \
          --host=mariadb \
          --user=root \
          --password=$${DB_PASSWORD} \
          --target-dir=$$BACKUP_DIR \
          --incremental-basedir=$$BASE_DIR \
          --parallel=4 \
          2>&1
        
        echo "$$(date -Iseconds) | INCREMENTAL | $$BACKUP_DIR | base=$$BASE_DIR" >> /backup/backup.log
        
        # Limpiar incrementales viejos (mantener últimos 6)
        ls -1td /backup/inc/* 2>/dev/null | tail -n +7 | xargs -r rm -rf
        
        echo "✅ Backup INCREMENTAL completado: $$BACKUP_DIR"
        echo "📊 Tamaño: $$(du -sh $$BACKUP_DIR | cut -f1)"
    environment:
      DB_PASSWORD: ${DB_PASSWORD:-123}
    volumes:
      - mariadb-data:/var/lib/mysql:ro
      - ./backups/mariadb-full:/backup/full
      - ./backups/mariadb-inc:/backup/inc
      - ./backups/backup.log:/backup/backup.log
    networks:
      - erp-network
    depends_on:
      - mariadb

  mariadb-restore:
    image: docker.io/mariadb:11.8
    container_name: erp-mariadb-restore
    command:
      - bash
      - -c
      - |
        echo "🔄 MariaDB RESTORE"
        echo "================================================"
        echo "Backups disponibles:"
        echo ""
        echo "FULL backups:"
        ls -1td /backup/full/* 2>/dev/null || echo "  (ninguno)"
        echo ""
        echo "INCREMENTAL backups:"
        ls -1td /backup/inc/* 2>/dev/null || echo "  (ninguno)"
        echo ""
        echo "⚠️  Para restaurar, ejecuta manualmente:"
        echo "   1. Detener el contenedor mariadb"
        echo "   2. Ejecutar: mariadb-backup --prepare --target-dir=/backup/full/XXX"
        echo "   3. Aplicar incrementales: mariadb-backup --prepare --target-dir=/backup/full/XXX --incremental-dir=/backup/inc/YYY"
        echo "   4. Copiar de vuelta: mariadb-backup --copy-back --target-dir=/backup/full/XXX"
        echo "   5. Iniciar mariadb"
    volumes:
      - ./backups/mariadb-full:/backup/full
      - ./backups/mariadb-inc:/backup/inc
    networks:
      - erp-network

  # ============================================================
  # RESTIC - Backup de archivos con deduplicación
  # ============================================================

  restic-init:
    image: docker.io/restic/restic:latest
    container_name: erp-restic-init
    command:
      - init
    environment:
      - RESTIC_REPOSITORY=/repo
      - RESTIC_PASSWORD=${RESTIC_PASSWORD:-erpnext_backup_2025}
    volumes:
      - ./backups/restic-repo:/repo

  restic-backup:
    image: docker.io/restic/restic:latest
    container_name: erp-restic-backup
    command:
      - backup
      - /data/sites
      - --tag
      - erpnext-daily
      - --exclude
      - '*.pyc'
      - --exclude
      - '__pycache__'
      - --exclude
      - 'node_modules'
      - --exclude
      - '.git'
    environment:
      - RESTIC_REPOSITORY=/repo
      - RESTIC_PASSWORD=${RESTIC_PASSWORD:-erpnext_backup_2025}
    volumes:
      - ./backups/restic-repo:/repo
      - ./development/frappe-bench/sites:/data/sites:ro
    depends_on:
      - restic-init

  restic-snapshots:
    image: docker.io/restic/restic:latest
    container_name: erp-restic-snapshots
    command:
      - snapshots
    environment:
      - RESTIC_REPOSITORY=/repo
      - RESTIC_PASSWORD=${RESTIC_PASSWORD:-erpnext_backup_2025}
    volumes:
      - ./backups/restic-repo:/repo

  restic-forget:
    image: docker.io/restic/restic:latest
    container_name: erp-restic-forget
    command:
      - forget
      - --keep-daily=7
      - --keep-weekly=4
      - --keep-monthly=6
      - --prune
    environment:
      - RESTIC_REPOSITORY=/repo
      - RESTIC_PASSWORD=${RESTIC_PASSWORD:-erpnext_backup_2025}
    volumes:
      - ./backups/restic-repo:/repo

  restic-restore:
    image: docker.io/restic/restic:latest
    container_name: erp-restic-restore
    command:
      - restore
      - latest
      - --target
      - /restore
    environment:
      - RESTIC_REPOSITORY=/repo
      - RESTIC_PASSWORD=${RESTIC_PASSWORD:-erpnext_backup_2025}
    volumes:
      - ./backups/restic-repo:/repo
      - ./backups/restore:/restore

  # ============================================================
  # ALL-IN-ONE: Backup completo (DB + archivos)
  # ============================================================

  backup-all:
    image: docker.io/alpine/curl:latest
    container_name: erp-backup-all
    command:
      - sh
      - -c
      - |
        echo "🚀 Iniciando backup completo $$(date)"
        echo "================================================"
        
        # 1. MariaDB backup
        echo "[1/3] MariaDB backup..."
        if [ "$${BACKUP_TYPE}" = "full" ] || [ "$$(date +%u)" = "7" ]; then
          echo "   → FULL backup"
          # Se ejecutaría: docker compose -f docker-compose.backup.yml run mariadb-backup-full
        else
          echo "   → INCREMENTAL backup"
          # Se ejecutaría: docker compose -f docker-compose.backup.yml run mariadb-backup-inc
        fi
        
        # 2. Restic backup
        echo "[2/3] Restic backup (archivos)..."
        # Se ejecutaría: docker compose -f docker-compose.backup.yml run restic-backup
        
        # 3. Rotación
        echo "[3/3] Rotación de backups antiguos..."
        # Se ejecutaría: docker compose -f docker-compose.backup.yml run restic-forget
        
        echo "✅ Backup completado $$(date)"
    environment:
      BACKUP_TYPE: ${BACKUP_TYPE:-auto}

volumes:
  mariadb-data:
    external: true
    name: erp_frappe_mariadb-data

networks:
  erp-network:
    external: true
    name: erp_frappe_erp-network
